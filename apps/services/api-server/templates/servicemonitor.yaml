{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled -}}
# ServiceMonitor — Prometheus Operator가 메트릭 수집 대상으로 인식
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "api-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "api-server.labels" . | nindent 4 }}
    # kube-prometheus-stack의 Prometheus가 이 레이블로 ServiceMonitor를 발견
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      {{- include "api-server.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      path: {{ .Values.metrics.path | default "/metrics" }}
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
