{{- if .Values.externalSecret.enabled -}}
# External Secrets Operator (ESO) — AWS Secrets Manager 연동
# ESO 설치 필요: helm install external-secrets external-secrets/external-secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "api-server.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "api-server.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    # ExternalSecret이 생성할 Kubernetes Secret 이름
    # Deployment의 envFromSecrets.secretName과 일치해야 함
    name: api-server-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    {{- toYaml .Values.externalSecret.data | nindent 4 }}
{{- end }}
