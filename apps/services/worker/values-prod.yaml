# worker/values-prod.yaml

replicaCount: 2

env:
  - name: APP_ENV
    value: production
  - name: LOG_LEVEL
    value: warn
  - name: WORKER_CONCURRENCY
    value: "10"

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    memory: 1Gi

# KEDA로 SQS 기반 스케일링 활성화
keda:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 30
  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: keda-aws-credentials
      metadata:
        queueURL: "https://sqs.ap-northeast-2.amazonaws.com/123456789/prod-worker-queue"
        queueLength: "5"
        awsRegion: ap-northeast-2
        identityOwner: operator

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789:role/prod-worker-role"

externalSecret:
  enabled: true
  data:
    - secretKey: QUEUE_URL
      remoteRef:
        key: /prod/worker/queue-url
    - secretKey: DATABASE_URL
      remoteRef:
        key: /prod/worker/database-url

podDisruptionBudget:
  enabled: true
  minAvailable: 1

terminationGracePeriodSeconds: 600   # prod에서는 더 긴 드레이닝
