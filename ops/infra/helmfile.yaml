# helmfile.yaml — 인프라 스택 전체 오케스트레이션
# 사용법: helmfile -e <env> sync

environments:
  dev:
    values:
      - environments/dev.yaml
  staging:
    values:
      - environments/staging.yaml
  prod:
    values:
      - environments/prod.yaml

---

# ── 레포는 base/ 없는 차트(istio, ingress-nginx, external-dns)에만 사용 ──
# karpenter / cert-manager / kube-prometheus-stack 은 base/ 로컬 경로 참조
repositories:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: external-dns
    url: https://kubernetes-sigs.github.io/external-dns
  - name: istio
    url: https://istio-release.storage.googleapis.com/charts

# 전역 기본값
helmDefaults:
  atomic: true
  cleanupOnFail: true
  timeout: 600
  wait: true
  waitForJobs: true

releases:
  # ──────────────────────────────────────────────
  # Layer 0: cert-manager (CRD 먼저 설치)
  # ──────────────────────────────────────────────
  - name: cert-manager
    namespace: cert-manager
    createNamespace: true
    # helm pull로 받아온 로컬 차트 (update-charts.sh cert-manager 로 업데이트)
    chart: ./cert-manager/base
    labels:
      layer: "0"
      app: cert-manager
    values:
      - cert-manager/base/values.yaml    # upstream 기본값
      - cert-manager/values.yaml         # 우리 오버라이드
    set:
      - name: crds.enabled
        value: true

  # ──────────────────────────────────────────────
  # Layer 1: ingress-nginx
  # ──────────────────────────────────────────────
  - name: ingress-nginx
    namespace: ingress-nginx
    createNamespace: true
    chart: ingress-nginx/ingress-nginx
    version: "4.11.3"
    labels:
      layer: "1"
      app: ingress-nginx
    values:
      - ingress-nginx/values.yaml
      - ingress-nginx/values-{{ .Environment.Name }}.yaml

  # ──────────────────────────────────────────────
  # Layer 2: external-dns
  # ──────────────────────────────────────────────
  - name: external-dns
    namespace: external-dns
    createNamespace: true
    chart: external-dns/external-dns
    version: "1.15.0"
    labels:
      layer: "2"
      app: external-dns
    values:
      - external-dns/values.yaml

  # ──────────────────────────────────────────────
  # Layer 3: karpenter (EKS 전용)
  # ──────────────────────────────────────────────
  - name: karpenter
    namespace: kube-system
    # helm pull로 받아온 로컬 차트 (update-charts.sh karpenter 로 업데이트)
    chart: ./karpenter/base
    labels:
      layer: "3"
      app: karpenter
    values:
      - karpenter/base/values.yaml       # upstream 기본값
      - karpenter/values.yaml            # 우리 오버라이드
      - karpenter/values-{{ .Environment.Name }}.yaml
    needs:
      - cert-manager/cert-manager

  # ──────────────────────────────────────────────
  # Layer 4: istio (순서 중요: base → istiod → gateway)
  # ──────────────────────────────────────────────
  - name: istio-base
    namespace: istio-system
    createNamespace: true
    chart: istio/base
    version: "1.24.2"
    labels:
      layer: "4"
      app: istio

  - name: istiod
    namespace: istio-system
    chart: istio/istiod
    version: "1.24.2"
    labels:
      layer: "4"
      app: istio
    values:
      - istio/istiod/values.yaml
    needs:
      - istio-system/istio-base

  - name: istio-gateway
    namespace: istio-system
    chart: istio/gateway
    version: "1.24.2"
    labels:
      layer: "4"
      app: istio
    values:
      - istio/gateway/values.yaml
    needs:
      - istio-system/istiod

  # ──────────────────────────────────────────────
  # Layer 5: monitoring (kube-prometheus-stack)
  # ──────────────────────────────────────────────
  - name: kube-prometheus-stack
    namespace: monitoring
    createNamespace: true
    # helm pull로 받아온 로컬 차트 (update-charts.sh monitoring 로 업데이트)
    chart: ./monitoring/kube-prometheus-stack/base
    labels:
      layer: "5"
      app: monitoring
    values:
      - monitoring/kube-prometheus-stack/base/values.yaml    # upstream 기본값
      - monitoring/kube-prometheus-stack/values.yaml         # 우리 오버라이드
      - monitoring/kube-prometheus-stack/values-{{ .Environment.Name }}.yaml
    set:
      - name: prometheusOperator.admissionWebhooks.certManager.enabled
        value: true
    needs:
      - cert-manager/cert-manager
