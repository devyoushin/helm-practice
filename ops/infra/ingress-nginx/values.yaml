# ingress-nginx/values.yaml
# 차트: ingress-nginx/ingress-nginx

controller:
  # ── 레플리카 ─────────────────────────────────────────────
  replicaCount: 2

  # ── 서비스 타입 ───────────────────────────────────────────
  service:
    type: LoadBalancer
    annotations:
      # AWS NLB
      service.beta.kubernetes.io/aws-load-balancer-type: "external"
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
      # 고정 IP (사전 할당된 EIP)
      # service.beta.kubernetes.io/aws-load-balancer-eip-allocations: eipalloc-xxx,eipalloc-yyy

  # ── ConfigMap 설정 ────────────────────────────────────────
  config:
    # 실제 클라이언트 IP 보존
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"   # NLB proxy protocol 사용 시 "true"

    # 성능 튜닝
    worker-processes: "auto"
    max-worker-connections: "16384"
    upstream-keepalive-connections: "200"
    upstream-keepalive-time: "1h"

    # 보안 헤더
    ssl-protocols: "TLSv1.2 TLSv1.3"
    ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
    hsts: "true"
    hsts-max-age: "31536000"
    hsts-include-subdomains: "true"

    # 로그 포맷 (JSON)
    log-format-escape-json: "true"
    log-format-upstream: >
      {"time":"$time_iso8601","remote_addr":"$proxy_protocol_addr",
      "x-forward-for":"$proxy_add_x_forwarded_for","request_id":"$req_id",
      "remote_user":"$remote_user","bytes_sent":"$bytes_sent",
      "request_time":"$request_time","status":"$status",
      "vhost":"$host","request_proto":"$server_protocol",
      "path":"$uri","request_query":"$args",
      "request_length":"$request_length","duration":"$request_time",
      "method":"$request_method","http_referrer":"$http_referer",
      "http_user_agent":"$http_user_agent","upstream_addr":"$upstream_addr"}

    # 타임아웃
    proxy-connect-timeout: "10"
    proxy-read-timeout: "60"
    proxy-send-timeout: "60"

    # Body 크기
    proxy-body-size: "32m"

  # ── 리소스 ───────────────────────────────────────────────
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

  # ── 오토스케일링 ──────────────────────────────────────────
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  # ── PodDisruptionBudget ───────────────────────────────────
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # ── 어피니티 ─────────────────────────────────────────────
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: controller

  # ── 메트릭 (Prometheus 연동) ──────────────────────────────
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring

  # ── 기본 SSL 인증서 ───────────────────────────────────────
  # extraArgs:
  #   default-ssl-certificate: "ingress-nginx/wildcard-tls"
