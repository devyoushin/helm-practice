# monitoring/kube-prometheus-stack/resources/prometheus-rules-application.yaml
# CRD: PrometheusRule (monitoring.coreos.com/v1)
# 역할: 애플리케이션 수준 SLO/알림 규칙
#
# 실무 팁: 각 서비스팀이 자신의 네임스페이스에 PrometheusRule을 직접 관리하는 경우가 많음
# 인프라팀은 이 파일처럼 공통 규칙만 관리

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: application-slo-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app: kube-prometheus-stack
spec:
  groups:
    # ── SLO 레코딩 규칙 (SLI 계산) ───────────────────────────
    # 실제 SLO는 서비스별로 다르므로 예시 기준으로 작성
    - name: slo.recording_rules
      interval: 30s
      rules:
        # HTTP 성공률 (4xx/5xx 제외)
        - record: job:http_requests_total:rate5m
          expr: |
            sum by(job, namespace) (
              rate(http_requests_total[5m])
            )

        - record: job:http_requests_errors:rate5m
          expr: |
            sum by(job, namespace) (
              rate(http_requests_total{status_code=~"5.."}[5m])
            )

        - record: job:http_request_duration_seconds:p99_5m
          expr: |
            histogram_quantile(0.99,
              sum by(job, namespace, le) (
                rate(http_request_duration_seconds_bucket[5m])
              )
            )

        - record: job:http_request_duration_seconds:p95_5m
          expr: |
            histogram_quantile(0.95,
              sum by(job, namespace, le) (
                rate(http_request_duration_seconds_bucket[5m])
              )
            )

    # ── SLO 알림 ────────────────────────────────────────────
    - name: slo.alerts
      rules:
        - alert: HighErrorRate
          expr: |
            (job:http_requests_errors:rate5m / job:http_requests_total:rate5m) * 100 > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.job }} error rate is above 1%"
            description: "{{ $labels.namespace }}/{{ $labels.job }} 에러율: {{ $value | printf \"%.2f\" }}%"

        - alert: HighErrorRateCritical
          expr: |
            (job:http_requests_errors:rate5m / job:http_requests_total:rate5m) * 100 > 5
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "{{ $labels.job }} error rate is above 5% — SLO breached"
            description: "{{ $labels.namespace }}/{{ $labels.job }} 에러율: {{ $value | printf \"%.2f\" }}%. SLO 위반."

        - alert: HighLatencyP99
          expr: job:http_request_duration_seconds:p99_5m > 1.0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.job }} P99 latency is above 1s"
            description: "P99 레이턴시: {{ $value | printf \"%.3f\" }}s"

        - alert: HighLatencyP99Critical
          expr: job:http_request_duration_seconds:p99_5m > 3.0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "{{ $labels.job }} P99 latency is above 3s — SLO breached"

    # ── 인프라 연동 서비스 ─────────────────────────────────────
    - name: external-services.rules
      rules:
        # SQS 큐 백로그 (워커 처리 지연)
        - alert: SqsQueueDepthHigh
          expr: |
            aws_sqs_approximate_number_of_messages_visible_average > 1000
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "SQS queue depth is high: {{ $labels.queue_name }}"
            description: "큐 백로그 {{ $value | printf \"%.0f\" }}개. 워커 스케일 아웃 필요."

        # RDS 연결 수 (max_connections 근접 시)
        - alert: RdsConnectionsHigh
          expr: |
            aws_rds_database_connections_average > 400
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "RDS {{ $labels.dbinstance_identifier }} connections are high"
            description: "연결 수: {{ $value | printf \"%.0f\" }}. Connection pooling 확인 필요."

    # ── Karpenter 관련 ───────────────────────────────────────
    - name: karpenter.rules
      rules:
        - alert: KarpenterNodeProvisioningFailed
          expr: |
            rate(karpenter_nodes_terminated_total[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Karpenter is terminating nodes at high rate"
            description: "Karpenter가 분당 {{ $value | printf \"%.2f\" }}개 노드를 종료하고 있습니다."

        - alert: KarpenterPodUnschedulable
          expr: |
            karpenter_pods_state{state="unschedulable"} > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pods are unschedulable for 10m"
            description: "{{ $value }}개의 파드가 10분 이상 스케줄되지 않고 있습니다. NodePool 설정 확인."
