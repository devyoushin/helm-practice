# api-server/values-prod.yaml
# prod 환경 오버라이드

replicaCount: 3   # HPA minReplicas와 동일하게 유지

ingress:
  enabled: true
  host: api.example.com
  annotations:
    # Rate limiting (DDoS 방어)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    # WAF (AWS WAF 연동 시)
    # alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:...

env:
  - name: APP_ENV
    value: production
  - name: LOG_LEVEL
    value: warn
  - name: PORT
    value: "8080"

# prod 리소스 (부하 테스트 기반으로 조정)
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    memory: 1Gi   # CPU limit은 의도적으로 미설정 (throttling 방지)

# HPA 활성화
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60   # prod는 더 여유 있게

# PDB — 롤링 업데이트 중 최소 2개 유지
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# 메트릭 수집
metrics:
  serviceMonitor:
    enabled: true

# IRSA — prod 전용 IAM Role
serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789:role/prod-api-server-role"

# External Secrets (AWS Secrets Manager)
externalSecret:
  enabled: true
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: /prod/api-server/database-url
    - secretKey: JWT_SECRET
      remoteRef:
        key: /prod/api-server/jwt-secret
    - secretKey: REDIS_URL
      remoteRef:
        key: /prod/api-server/redis-url

# Graceful shutdown 시간 늘리기
terminationGracePeriodSeconds: 90

# 가용영역 분산 (3 AZ 기준)
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: api-server
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: api-server
