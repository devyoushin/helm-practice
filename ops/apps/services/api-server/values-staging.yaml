# api-server/values-staging.yaml
# staging 환경 오버라이드 — prod와 최대한 동일한 설정

replicaCount: 2

ingress:
  enabled: true
  host: api.staging.example.com

env:
  - name: APP_ENV
    value: staging
  - name: LOG_LEVEL
    value: info
  - name: PORT
    value: "8080"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

podDisruptionBudget:
  enabled: true
  minAvailable: 1

metrics:
  serviceMonitor:
    enabled: true
