# ──────────────────────────────────────────────
# Staging 환경 오버라이드
# 사용법: helm install production-app charts/production-app -f charts/production-app/values-staging.yaml
# ──────────────────────────────────────────────

replicaCount: 2

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

config:
  APP_ENV: "staging"
  LOG_LEVEL: "info"
  SERVER_PORT: "8080"
  MAX_CONNECTIONS: "50"

ingress:
  enabled: true
  hosts:
    - host: production-app.staging.example.com
      paths:
        - path: /
          pathType: Prefix
