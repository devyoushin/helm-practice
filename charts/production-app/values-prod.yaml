# ──────────────────────────────────────────────
# Production 환경 오버라이드
# 사용법: helm install production-app charts/production-app \
#           -f charts/production-app/values-prod.yaml \
#           --set secret.data.DB_PASSWORD=$DB_PASSWORD \
#           --set secret.data.API_KEY=$API_KEY
# ──────────────────────────────────────────────

replicaCount: 3

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 75

podDisruptionBudget:
  enabled: true
  minAvailable: 2   # 3대 중 최소 2대는 항상 Running 보장

config:
  APP_ENV: "production"
  LOG_LEVEL: "warn"
  SERVER_PORT: "8080"
  MAX_CONNECTIONS: "200"

ingress:
  enabled: true
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: production-app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: production-app-tls
      hosts:
        - production-app.example.com

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

terminationGracePeriodSeconds: 120
