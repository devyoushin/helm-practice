{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "production-app.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "production-app.labels" . | nindent 4 }}
  annotations:
    # helm upgrade 시 Secret을 항상 재생성하지 않도록 주의
    # 실전 팁: helm-secrets 또는 External Secrets Operator 사용 권장
type: Opaque
data:
  {{- range $key, $value := .Values.secret.data }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
