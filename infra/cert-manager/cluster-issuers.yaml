# cert-manager/cluster-issuers.yaml
# cert-manager 설치 후 kubectl apply -f cluster-issuers.yaml
# 또는 Helm post-install hook으로 적용

---
# Let's Encrypt Staging (테스트용 — rate limit 없음)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: infra@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      # HTTP-01: Ingress를 통한 검증 (기본)
      - http01:
          ingress:
            ingressClassName: nginx
      # DNS-01: 와일드카드 인증서용 (Route53)
      - dns01:
          route53:
            region: ap-northeast-2
            hostedZoneID: ""   # Route53 Hosted Zone ID
          selector:
            dnsZones:
              - "example.com"

---
# Let's Encrypt Production
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: infra@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
      - dns01:
          route53:
            region: ap-northeast-2
            hostedZoneID: ""
          selector:
            dnsZones:
              - "example.com"
