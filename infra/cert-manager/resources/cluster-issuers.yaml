# cert-manager/resources/cluster-issuers.yaml
# CRD: ClusterIssuer (cert-manager.io/v1)
# 역할: 인증서 발급 방식 정의 (Let's Encrypt HTTP-01 / DNS-01)
#
# 적용: kubectl apply -f infra/cert-manager/resources/
# 전제: cert-manager가 설치되어 있어야 함
#
# 실무 팁:
# - 스테이징 issuer로 먼저 테스트 (rate limit 없음)
# - DNS-01은 와일드카드 인증서 발급 가능 (*.example.com)
# - HTTP-01은 각 도메인마다 개별 발급, 와일드카드 불가

---
# Let's Encrypt Staging (테스트/개발용)
# rate limit 없음 → 테스트 배포에 항상 이것 먼저 사용
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  annotations:
    cert-manager.io/description: "Let's Encrypt 스테이징. 인증서가 신뢰되지 않으므로 테스트 전용."
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: infra@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      # HTTP-01: ingress 통해 /.well-known/acme-challenge/ 응답
      - http01:
          ingress:
            ingressClassName: nginx
        # 특정 도메인에만 적용 (selector 없으면 모든 도메인)
        # selector:
        #   dnsNames:
        #     - "api.example.com"

      # DNS-01: Route53으로 _acme-challenge TXT 레코드 생성
      # 와일드카드 인증서 발급 시 필수
      - dns01:
          route53:
            region: ap-northeast-2
            # IRSA로 권한 부여 (cert-manager ServiceAccount에 Route53 권한)
            # hostedZoneID 지정 시 해당 존만 접근 (보안 강화)
            hostedZoneID: ""   # 예) Z1234567890ABC
        selector:
          dnsNames:
            - "*.example.com"         # 와일드카드
            - "*.dev.example.com"

---
# Let's Encrypt Production
# rate limit 있음 (주 50개) → 반드시 staging에서 검증 후 사용
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    cert-manager.io/description: "Let's Encrypt 프로덕션. 브라우저에서 신뢰되는 인증서."
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: infra@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
      - dns01:
          route53:
            region: ap-northeast-2
            hostedZoneID: ""
        selector:
          dnsNames:
            - "*.example.com"
            - "*.staging.example.com"

---
# 내부 CA (사내 서비스, mTLS용)
# cert-manager가 자체 CA를 통해 인증서 발급
# Istio mTLS나 내부 서비스 간 TLS에 사용
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: internal-ca
  annotations:
    cert-manager.io/description: "사내 서비스용 내부 CA. 외부에 노출되지 않는 서비스에 사용."
spec:
  ca:
    # 사전에 CA 인증서를 Secret으로 생성해야 함
    # kubectl create secret tls internal-ca-keypair \
    #   --cert=ca.crt --key=ca.key -n cert-manager
    secretName: internal-ca-keypair
