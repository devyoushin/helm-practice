# karpenter/values.yaml
# Chart: oci://public.ecr.aws/karpenter/karpenter
# Version: 1.1.1
# Docs: https://karpenter.sh/docs/

# ── 필수: EKS 클러스터 정보 ────────────────────────────────────
# 실제 배포 시 helmfile environments 또는 --set 으로 주입
settings:
  clusterName: ""           # 예) my-eks-cluster
  clusterEndpoint: ""       # 예) https://XXXX.gr7.ap-northeast-2.eks.amazonaws.com
  interruptionQueue: ""     # SQS 큐 이름 (Spot 인터럽션 처리용)
                            # 예) Karpenter-my-eks-cluster

# ── ServiceAccount (EKS Pod Identity 또는 IRSA) ────────────────
serviceAccount:
  create: true
  name: karpenter
  annotations:
    # IRSA 방식 (구형)
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/KarpenterControllerRole-CLUSTER_NAME
    #
    # EKS Pod Identity 방식 (신형, 권장)
    # eks.amazonaws.com/role-arn 대신 EKS콘솔에서 Pod Identity Association 설정

# ── Controller ────────────────────────────────────────────────
controller:
  image:
    repository: public.ecr.aws/karpenter/controller
    tag: "1.1.1"
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  env: []
  # 예) 로그 레벨 오버라이드
  # - name: LOG_LEVEL
  #   value: debug

# ── 고가용성 ──────────────────────────────────────────────────
replicas: 2

podDisruptionBudget:
  minAvailable: 1

# Karpenter 자신은 Karpenter가 관리하는 노드에서 실행되면 안 됨
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: karpenter.sh/nodepool
              operator: DoesNotExist
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - topologyKey: kubernetes.io/hostname
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: karpenter

tolerations:
  - key: CriticalAddonsOnly
    operator: Exists
  - key: node-role.kubernetes.io/control-plane
    effect: NoSchedule

# ── 로깅 ──────────────────────────────────────────────────────
logLevel: info    # debug | info | error
logOutputPaths: ["stdout"]
logErrorOutputPaths: ["stderr"]

# ── 메트릭 ────────────────────────────────────────────────────
# Prometheus ServiceMonitor는 resources/ 에서 별도 관리
serviceMonitor:
  enabled: false   # kube-prometheus-stack 설치 후 resources/에서 활성화
