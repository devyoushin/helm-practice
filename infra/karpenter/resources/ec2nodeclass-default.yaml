# karpenter/resources/ec2nodeclass-default.yaml
# CRD: EC2NodeClass (karpenter.k8s.aws/v1)
# 역할: EC2 인스턴스 수준 설정 (AMI, 서브넷, 보안그룹, 스토리지 등)
#
# 적용: kubectl apply -f infra/karpenter/resources/ec2nodeclass-default.yaml
# 전제: karpenter가 이미 설치되어 있어야 함

---
# 일반 워크로드용 NodeClass
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
  annotations:
    # 변경 이유 기록 (팀 협업용)
    karpenter.sh/description: "일반 워크로드용 기본 NodeClass (AL2023, gp3 50GB)"
spec:
  # ── AMI ────────────────────────────────────────────────────
  # alias 방식: EKS 버전에 맞는 최신 AL2023 AMI 자동 선택 (권장)
  amiSelectorTerms:
    - alias: al2023@latest
  # 고정 버전이 필요하면 alias 대신 name 패턴 사용:
  # amiSelectorTerms:
  #   - name: amazon-eks-node-al2023-x86_64-standard-1.31-*

  # ── IAM ─────────────────────────────────────────────────────
  # EKS 클러스터에 맞는 Node IAM Role 이름 (ARN 아님)
  # 예) terraform output으로 얻은 노드 롤 이름
  role: "KarpenterNodeRole-my-eks-cluster"

  # ── 네트워크 ─────────────────────────────────────────────────
  # 태그 기반 자동 검색 (클러스터 생성 시 태그 달려 있어야 함)
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "my-eks-cluster"
        # 특정 서브넷만 쓰려면 Name 태그로 필터:
        # Name: "*private*"

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "my-eks-cluster"

  # ── 스토리지 ─────────────────────────────────────────────────
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeType: gp3
        volumeSize: 50Gi
        iops: 3000          # gp3 기본값, 추가 비용 없음
        throughput: 125     # MiB/s, gp3 기본값
        encrypted: true     # 필수 (보안 컴플라이언스)
        deleteOnTermination: true

  # ── IMDSv2 강제 ────────────────────────────────────────────
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 1    # IMDSv2 강제 (hop 2 이상이면 컨테이너에서 접근 가능)
    httpTokens: required          # IMDSv1 차단

  # ── 태그 전파 ───────────────────────────────────────────────
  # EC2 인스턴스에 자동으로 추가될 태그
  tags:
    ManagedBy: karpenter
    Cluster: my-eks-cluster
    Environment: production

  # ── 사용자 데이터 (필요 시) ─────────────────────────────────
  # AL2023은 대부분 불필요. 커스텀 설정이 있을 때만 사용.
  # userData: |
  #   #!/bin/bash
  #   # 추가 커널 파라미터
  #   echo "fs.inotify.max_user_instances=8192" >> /etc/sysctl.conf
  #   sysctl -p

---
# GPU 워크로드용 NodeClass (p4d/g5 계열)
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: gpu
  annotations:
    karpenter.sh/description: "GPU 워크로드용 NodeClass (AL2023 + NVIDIA driver, gp3 200GB)"
spec:
  amiSelectorTerms:
    # GPU AMI — EKS 최적화 AL2023 GPU 이미지
    - alias: al2023@latest
  role: "KarpenterNodeRole-my-eks-cluster"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "my-eks-cluster"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "my-eks-cluster"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeType: gp3
        volumeSize: 200Gi   # GPU 워크로드는 모델/데이터 저장 공간 필요
        iops: 4000
        throughput: 500
        encrypted: true
        deleteOnTermination: true
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 1
    httpTokens: required
  tags:
    ManagedBy: karpenter
    Cluster: my-eks-cluster
    Environment: production
    NodeType: gpu
